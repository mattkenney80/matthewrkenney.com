<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 320">
  <defs>
    <style>
      .cartoon-text { font-family: Georgia, serif; font-size: 12px; fill: #1a1a1a; }
      .cartoon-quote { font-family: Georgia, serif; font-size: 11px; fill: #555; font-style: italic; }
    </style>
  </defs>

  <rect width="560" height="320" fill="#fafaf8"/>
  <rect x="8" y="8" width="544" height="304" fill="none" stroke="#333" stroke-width="1.5"/>

  <!-- Chair -->
  <rect x="30" y="70" width="40" height="55" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="30" y1="125" x2="18" y2="145" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="70" y1="125" x2="82" y2="145" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- Figure sitting, head bowed -->
  <circle cx="50" cy="50" r="12" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="50" y1="62" x2="50" y2="75" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="50" y1="68" x2="38" y2="80" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="50" y1="68" x2="62" y2="80" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- Empty frame on wall -->
  <rect x="150" y="45" width="80" height="100" fill="none" stroke="#999" stroke-width="1.5"/>
  <line x1="158" y1="55" x2="222" y2="135" stroke="#999" stroke-width="0.8" opacity="0.5"/>
  <line x1="222" y1="55" x2="158" y2="135" stroke="#999" stroke-width="0.8" opacity="0.5"/>

  <!-- Quote -->
  <text x="280" y="65" class="cartoon-quote" text-anchor="start">
    "He meant to document a good man.
  </text>
  <text x="280" y="80" class="cartoon-quote" text-anchor="start">
    Instead he made a record of how
  </text>
  <text x="280" y="95" class="cartoon-quote" text-anchor="start">
    easily the world breaks the innocent.
  </text>
  <text x="280" y="110" class="cartoon-quote" text-anchor="start">
    That's not filmmaking. That's witness."
  </text>

  <text x="280" y="135" class="cartoon-text" font-size="10" text-anchor="start" fill="#999">
    — Dear Zachary
  </text>
</svg>