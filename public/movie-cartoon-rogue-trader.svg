<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 320">
  <defs>
    <style>
      .cartoon-text { font-family: Georgia, serif; font-size: 12px; fill: #1a1a1a; }
      .cartoon-quote { font-family: Georgia, serif; font-size: 11px; fill: #555; font-style: italic; }
    </style>
  </defs>

  <rect width="560" height="320" fill="#fafaf8"/>
  <rect x="8" y="8" width="544" height="304" fill="none" stroke="#333" stroke-width="1.5"/>

  <!-- Desk with monitors -->
  <rect x="30" y="70" width="140" height="70" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- Three monitors -->
  <rect x="40" y="35" width="30" height="25" fill="none" stroke="#1a1a1a" stroke-width="1"/>
  <rect x="80" y="30" width="30" height="30" fill="none" stroke="#1a1a1a" stroke-width="1"/>
  <rect x="120" y="35" width="30" height="25" fill="none" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Desk supports -->
  <line x1="40" y1="60" x2="40" y2="70" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="150" y1="60" x2="150" y2="70" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Figure hunched over -->
  <ellipse cx="80" cy="110" rx="15" ry="18" fill="#1a1a1a"/>
  <line x1="80" y1="130" x2="80" y2="150" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- Papers scattered -->
  <line x1="110" y1="85" x2="125" y2="75" stroke="#999" stroke-width="0.8"/>
  <line x1="115" y1="95" x2="130" y2="85" stroke="#999" stroke-width="0.8"/>

  <!-- The hole beneath -->
  <path d="M 40 155 Q 60 175 80 178 Q 100 175 120 155" fill="none" stroke="#ccc" stroke-width="1.5" stroke-dasharray="2,2"/>

  <!-- Quote -->
  <text x="200" y="50" class="cartoon-quote" text-anchor="start">
    "The first lie is the hardest. After that,
  </text>
  <text x="200" y="65" class="cartoon-quote" text-anchor="start">
    you just keep digging. The hole gets deeper
  </text>
  <text x="200" y="80" class="cartoon-quote" text-anchor="start">
    but your shovel gets lighter. That's how
  </text>
  <text x="200" y="95" class="cartoon-quote" text-anchor="start">
    you know you're lost."
  </text>

  <text x="200" y="120" class="cartoon-text" font-size="10" text-anchor="start" fill="#999">
    — Rogue Trader
  </text>
</svg>