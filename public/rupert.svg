<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Rupert the beagle -->
  <!-- ears -->
  <ellipse cx="11" cy="37" rx="9" ry="16" fill="#4a2f23" transform="rotate(12 11 37)"/>
  <ellipse cx="53" cy="37" rx="9" ry="16" fill="#4a2f23" transform="rotate(-12 53 37)"/>
  <!-- head -->
  <circle cx="32" cy="33" r="20" fill="#f8f2e6"/>
  <defs>
    <clipPath id="head">
      <circle cx="32" cy="33" r="20"/>
    </clipPath>
  </defs>
  <g clip-path="url(#head)">
    <!-- tan crown -->
    <rect x="10" y="11" width="44" height="23" fill="#c98a4b"/>
    <!-- white blaze up the forehead -->
    <path d="M28.5 11 h7 l2.5 23 h-12 z" fill="#f8f2e6"/>
  </g>
  <!-- eyes -->
  <circle cx="23.5" cy="30.5" r="2.7" fill="#2b2119"/>
  <circle cx="40.5" cy="30.5" r="2.7" fill="#2b2119"/>
  <!-- eye glints -->
  <circle cx="24.4" cy="29.7" r="0.8" fill="#f8f2e6"/>
  <circle cx="41.4" cy="29.7" r="0.8" fill="#f8f2e6"/>
  <!-- nose -->
  <ellipse cx="32" cy="38.5" rx="4.2" ry="3.2" fill="#241a14"/>
  <!-- mouth -->
  <path d="M32 41.5 v2.5 m0 0 q-3 3.2 -6.5 1.2 m6.5 -1.2 q3 3.2 6.5 1.2" stroke="#241a14" stroke-width="1.6" fill="none" stroke-linecap="round"/>
</svg>
