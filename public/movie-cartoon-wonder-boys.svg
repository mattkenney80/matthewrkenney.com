<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 320">
  <defs>
    <style>
      .cartoon-text { font-family: Georgia, serif; font-size: 12px; fill: #1a1a1a; }
      .cartoon-quote { font-family: Georgia, serif; font-size: 11px; fill: #555; font-style: italic; }
    </style>
  </defs>

  <rect width="560" height="320" fill="#fafaf8"/>
  <rect x="8" y="8" width="544" height="304" fill="none" stroke="#333" stroke-width="1.5"/>

  <!-- Typewriter -->
  <rect x="30" y="70" width="120" height="60" fill="none" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <circle cx="42" cy="85" r="7" fill="none" stroke="#1a1a1a" stroke-width="1"/>
  <circle cx="138" cy="85" r="7" fill="none" stroke="#1a1a1a" stroke-width="1"/>
  <circle cx="55" cy="105" r="2" fill="none" stroke="#1a1a1a" stroke-width="0.8"/>
  <circle cx="70" cy="105" r="2" fill="none" stroke="#1a1a1a" stroke-width="0.8"/>
  <circle cx="85" cy="105" r="2" fill="none" stroke="#1a1a1a" stroke-width="0.8"/>
  <circle cx="100" cy="105" r="2" fill="none" stroke="#1a1a1a" stroke-width="0.8"/>
  <circle cx="115" cy="105" r="2" fill="none" stroke="#1a1a1a" stroke-width="0.8"/>
  <line x1="38" y1="78" x2="142" y2="78" stroke="#999" stroke-width="0.8"/>

  <!-- Manuscript stack -->
  <rect x="180" y="95" width="35" height="50" fill="none" stroke="#999" stroke-width="0.8"/>
  <rect x="184" y="100" width="35" height="50" fill="none" stroke="#999" stroke-width="0.8"/>
  <rect x="188" y="105" width="35" height="50" fill="none" stroke="#999" stroke-width="0.8"/>

  <!-- Dead dog in trunk -->
  <ellipse cx="260" cy="115" rx="28" ry="18" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="280" cy="95" r="9" fill="none" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="265" y1="135" x2="250" y2="155" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="285" y1="135" x2="300" y2="155" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Quote -->
  <text x="30" y="190" class="cartoon-quote" text-anchor="start">
    "He'd been writing the same book for seven years. Two thousand
  </text>
  <text x="30" y="205" class="cartoon-quote" text-anchor="start">
    pages and no ending. Most writers call that failure. He called it
  </text>
  <text x="30" y="220" class="cartoon-quote" text-anchor="start">
    honesty about the human condition. He was right, which made it worse."
  </text>

  <text x="30" y="245" class="cartoon-text" font-size="10" text-anchor="start" fill="#999">
    — Wonder Boys
  </text>
</svg>