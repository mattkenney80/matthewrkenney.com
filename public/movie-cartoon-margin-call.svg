<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 320">
  <defs>
    <style>
      .cartoon-text { font-family: Georgia, serif; font-size: 12px; fill: #1a1a1a; }
      .cartoon-quote { font-family: Georgia, serif; font-size: 11px; fill: #555; font-style: italic; }
    </style>
  </defs>

  <rect width="560" height="320" fill="#fafaf8"/>
  <rect x="8" y="8" width="544" height="304" fill="none" stroke="#333" stroke-width="1.5"/>

  <!-- Background stairs/blocks representing climb -->
  <!-- Bottom left block -->
  <rect x="80" y="220" width="80" height="30" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="80" y1="235" x2="160" y2="235" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Second block -->
  <rect x="140" y="180" width="80" height="40" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="140" y1="200" x2="220" y2="200" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="155" y1="185" x2="165" y2="175" stroke="#999" stroke-width="1"/>
  <line x1="170" y1="185" x2="180" y2="175" stroke="#999" stroke-width="1"/>

  <!-- Third block -->
  <rect x="200" y="135" width="80" height="45" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="200" y1="160" x2="280" y2="160" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="215" y1="140" x2="225" y2="125" stroke="#999" stroke-width="1"/>
  <line x1="230" y1="140" x2="240" y2="125" stroke="#999" stroke-width="1"/>

  <!-- Top block -->
  <rect x="260" y="85" width="80" height="50" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="260" y1="110" x2="340" y2="110" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Figure on middle block -->
  <circle cx="220" cy="100" r="16" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Head details -->
  <circle cx="214" cy="97" r="1.5" fill="#1a1a1a"/>
  <circle cx="226" cy="97" r="1.5" fill="#1a1a1a"/>
  <path d="M 216 105 Q 220 107 224 105" fill="none" stroke="#1a1a1a" stroke-width="1" stroke-linecap="round"/>

  <!-- Tie -->
  <rect x="218" y="110" width="4" height="12" fill="#1a1a1a"/>

  <!-- Body -->
  <line x1="220" y1="116" x2="220" y2="135" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- Arms -->
  <line x1="220" y1="122" x2="200" y2="130" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="220" y1="122" x2="240" y2="130" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- Legs -->
  <line x1="220" y1="135" x2="210" y2="155" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="220" y1="135" x2="230" y2="155" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- Quote -->
  <text x="30" y="260" class="cartoon-quote" text-anchor="start">
    "There are people who want to take
  </text>
  <text x="30" y="275" class="cartoon-quote" text-anchor="start">
    the long ride home. I'm sitting it out."
  </text>

  <text x="30" y="300" class="cartoon-text" font-size="10" text-anchor="start" fill="#999">
    — Margin Call
  </text>
</svg>